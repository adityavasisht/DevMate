name: CI Pipeline

# Trigger on every push to main and on pull requests
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # Job 1 — Test and build the backend
  backend:
    name: Backend Tests & Build
    runs-on: ubuntu-latest

    services:
      # Spin up a PostgreSQL instance for testing
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: devmate_user
          POSTGRES_PASSWORD: devmate_password
          POSTGRES_DB: devmate_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      # Spin up Redis for testing
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: backend

    steps:
      # Step 1 — Check out the code
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2 — Set up Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      # Step 3 — Install dependencies
      - name: Install dependencies
        run: npm ci

      # Step 4 — Generate Prisma client
      - name: Generate Prisma client
        run: npx prisma generate
        env:
          DATABASE_URL: postgresql://devmate_user:devmate_password@localhost:5432/devmate_test

      # Step 5 — Run database migrations
      - name: Run migrations
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: postgresql://devmate_user:devmate_password@localhost:5432/devmate_test

      # Step 6 — Run Jest tests
      - name: Run tests
        run: npm test
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://devmate_user:devmate_password@localhost:5432/devmate_test
          JWT_SECRET: test_secret_key_for_ci
          JWT_EXPIRES_IN: 7d
          GEMINI_API_KEY: dummy_key_for_tests
          REDIS_URL: redis://localhost:6379

      # Step 7 — Build TypeScript
      - name: Build
        run: npm run build
        env:
          NODE_ENV: production
          DATABASE_URL: postgresql://devmate_user:devmate_password@localhost:5432/devmate_test
          JWT_SECRET: test_secret_key_for_ci
          JWT_EXPIRES_IN: 7d
          GEMINI_API_KEY: dummy_key_for_tests
          REDIS_URL: redis://localhost:6379

  # Job 2 — Build the frontend
  frontend:
    name: Frontend Build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build
        env:
          VITE_API_URL: http://localhost:8000