services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: devmate_postgres
    environment:
      POSTGRES_USER: devmate_user
      POSTGRES_PASSWORD: devmate_password
      POSTGRES_DB: devmate_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: devmate_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data: